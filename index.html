<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CutBox Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <header class="hero">
    <div>
      <h1>CutBox Studio</h1>
      <p>Generador SVG para Brother ScanNCut · A4 · medidas en mm</p>
    </div>
    <span class="badge">V2.1</span>
  </header>
  <section class="layout">
    <aside class="panel">
      <label>Tipo de plantilla</label>
      <select id="modelo">
        <option value="caja-simple">Caja simple</option>
        <option value="caja-tapa">Caja con tapa</option>
        <option value="sobre">Sobre profesional</option>
        <option value="etiqueta-rect">Etiqueta rectangular</option>
        <option value="etiqueta-redonda">Etiqueta redonda</option>
        <option value="pillow">Caja almohada</option>
        <option value="auto">Caja automontable</option>
      </select>
      <label>Ancho (mm)</label><input id="ancho" type="number" value="60" min="10">
      <label>Alto (mm)</label><input id="alto" type="number" value="80" min="10">
      <label>Profundidad / solapa (mm)</label><input id="prof" type="number" value="30" min="5">
      <button onclick="generarPlantilla()">Generar SVG</button>
      <p class="nota">Negro = corte · Rojo punteado = pliegue</p>
    </aside>
    <section id="resultado" class="resultado">
      <p class="vacio">Elegí una plantilla y tocá generar.</p>
    </section>
  </section>
</main>
<script src="svg.js?v=21"></script>
<script src="modelos.js?v=21"></script>
<script src="exportar.js?v=21"></script>
<script src="app.js?v=21"></script>
</body>
</html>
