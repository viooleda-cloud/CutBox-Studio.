<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CutBox Studio V10.10</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <header class="hero">
    <div>
      <h1>CutBox Studio <span>V10.10</span></h1>
      <p>Generador SVG para Brother ScanNCut · A4 · Packaging · Sobres · Etiquetas</p>
    </div>
    <button class="ghost" onclick="resetear()">Reset</button>
  </header>

  <section class="grid">
    <aside class="panel">
      <label>Buscar plantilla</label>
      <input id="busqueda" type="text" placeholder="Ej: taza, sobre, etiqueta" oninput="filtrarModelos()">

      <label>Categoría</label>
      <select id="categoria" onchange="filtrarModelos()">
        <option value="todas">Todas</option>
        <option value="cajas">Cajas</option>
        <option value="sobres">Sobres</option>
        <option value="etiquetas">Etiquetas</option>
        <option value="regalos">Regalos</option>
      </select>

      <label>Plantilla</label>
      <select id="modelo"></select>

      <div class="medidas">
        <label>Ancho (mm)</label>
        <input id="ancho" type="number" value="70">

        <label>Alto (mm)</label>
        <input id="alto" type="number" value="90">

        <label>Profundidad / solapa (mm)</label>
        <input id="prof" type="number" value="30">
      </div>

      <button class="primary" onclick="generarPlantilla()">Generar SVG</button>

      <div id="info" class="info">
        Elegí una plantilla y generá el SVG.
      </div>
    </aside>

    <section class="preview">
      <div class="previewTop">
        <h2>Vista previa A4</h2>
        <span id="estado">Listo</span>
      </div>
      <div id="resultado" class="resultado">
        <p class="empty">Todavía no generaste ninguna plantilla.</p>
      </div>
    </section>
  </section>
</main>

<script src="svg.js?v=1010"></script>
<script src="modelos.js?v=1010"></script>
<script src="exportar.js?v=1010"></script>
<script src="app.js?v=1010"></script>
</body>
</html>
