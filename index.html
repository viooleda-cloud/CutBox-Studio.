<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CutBox Studio V2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">
  <header>
    <h1>CutBox Studio</h1>
    <p>Generador SVG para Brother ScanNCut</p>
  </header>

  <section class="panel">
    <label>Modelo</label>
    <select id="modelo">
      <option value="caja-simple">Caja simple</option>
      <option value="sobre">Sobre profesional</option>
      <option value="etiqueta-rect">Etiqueta rectangular</option>
      <option value="etiqueta-redonda">Etiqueta redonda</option>
    </select>

    <label>Ancho (mm)</label>
    <input id="ancho" type="number" value="60">

    <label>Alto (mm)</label>
    <input id="alto" type="number" value="80">

    <label>Profundidad / solapa (mm)</label>
    <input id="prof" type="number" value="30">

    <button onclick="generar()">Generar SVG</button>
  </section>

  <section id="resultado" class="resultado">
    <p>Elegí un modelo y tocá generar.</p>
  </section>
</main>

<script src="script.js?v=10"></script>
</body>
</html>
